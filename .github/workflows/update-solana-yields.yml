name: Update Solana yields

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-solana-yields
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Refresh APY data
        env:
          JUPITER_API_KEY: ${{ secrets.JUPITER_API_KEY }}
        run: python scripts/update_yields.py

      - name: Commit changed rates
        run: |
          if git diff --quiet; then
            echo "No yield changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/yields.json _posts/2026-07-24-best-solana-passive-income.md
          git commit -m "chore: refresh Solana yield data"
          git push
